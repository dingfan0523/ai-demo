server:
  port: 8080

spring:
  jackson:
    serialization:
      indent-output: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# ============================================================
# 模型配置（手动 @Bean 创建，不走 starter 自动配置）
# 代理配置也在此处统一管理
# ============================================================
ai:
  default-provider: deepseek
  request-timeout: 60s
  stream-timeout: 5m
  max-concurrent-requests: 20
  max-retries: 2
  log-requests: false
  log-responses: false
  # 代理配置（访问境外 API 时需要）
  proxy:
    enabled: true
    host: 127.0.0.1
    port: 10808
    type: http
  chatgpt:
    api-key: ${CHATGPT_API_KEY:}
    base-url: ${CHATGPT_BASE_URL:https://api.openai.com/v1}
    model: ${CHATGPT_MODEL:gpt-5.4}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
